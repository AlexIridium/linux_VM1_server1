global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nginx'
    metrics_path: /metrics
    static_configs:
      - targets: ['10.17.86.172:80']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['10.17.86.172:9100']
